<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>連絡先を追加</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script>

var ua = navigator.userAgent.toLowerCase();

if (ua.indexOf("line") !== -1) {
  window.onload = function() {
    document.getElementById("lineWarning").style.display = "block";
  }
} else {
  window.location.href = "contact.vcf";
}

</script>

</head>

<body style="font-family:sans-serif;text-align:center;padding:40px;background:#f7f7f7;">

<div id="lineWarning" style="display:none;">

<h2>連絡先を追加するには</h2>

<p style="line-height:1.8;margin-top:20px;">

LINEのブラウザでは<br>
連絡先を追加できない場合があります。<br><br>

メニュー（⋮）から<br>
<strong>「ブラウザで開く」</strong><br>
を選んでください。<br><br>

※ボタンが反応しない場合は<br>
<strong>長押しして開いてください</strong>

</p>

<a href="okai.vcf" style="
display:inline-block;
padding:14px 24px;
background:#2d7ef7;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
margin-top:25px;
font-size:16px;
">

連絡先を追加する

</a>

</div>

</body>
</html>
